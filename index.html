<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مفاجأة لنانسي 🧼✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #fdf6f7; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Cairo', sans-serif; overflow: hidden; }
        #bubble-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .bubble { position: absolute; background: radial-gradient(circle at 30% 30%, #fff, #fbcfe8); border-radius: 50%; opacity: 0.6; cursor: pointer; pointer-events: auto; animation: float 10s linear infinite; }
        @keyframes float { 0% { transform: translateY(100vh); } 100% { transform: translateY(-100px); } }
        
        .card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; z-index: 2; width: 90%; max-width: 500px; }
        #typewriter { font-size: 24px; font-weight: 800; color: #831843; min-height: 80px; }
        .pop-text { position: absolute; color: #be185d; font-weight: bold; pointer-events: none; z-index: 10; animation: fade 1.5s ease-out forwards; }
        @keyframes fade { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }
    </style>
</head>
<body>

    <div id="bubble-container"></div>
    <div class="card">
        <div id="typewriter"></div>
        <p style="color: #666; margin-top: 20px;">فرقعي الفقاعات اللي حواليكي وشوفي إيه المستخبي! 🫧</p>
    </div>

    <script>
        // تأثير الكتابة
        const text = "صباح الخير يا نانسي.. يا أجمل وأشطر سيدة أعمال.. مبروك على مشروعك الجديد، أنا فخور بيكي جداً وهفضل دايماً الداعم الأول ليكي. ❤️";
        let i = 0;
        function type() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 100);
            }
        }
        type();

        // الفقاعات
        const container = document.getElementById('bubble-container');
        function createBubble() {
            const b = document.createElement('div');
            b.className = 'bubble';
            const size = Math.random() * 60 + 40;
            b.style.width = size + 'px';
            b.style.height = size + 'px';
            b.style.left = Math.random() * 100 + '%';
            b.style.animationDuration = (Math.random() * 5 + 5) + 's';
            b.onclick = (e) => {
                pop(e.clientX, e.clientY);
                b.remove();
            };
            container.appendChild(b);
            setTimeout(() => b.remove(), 10000);
        }
        setInterval(createBubble, 1000);

        function pop(x, y) {
            const msgs = ["بحبك ❤️", "يا قمر 🌸", "بالتوفيق يا بطلة 🚀", "انتي فخر ليا ✨", "دايماً في ضهرك 💪", "أحلى صابون ده ولا إيه؟ 🧼"];
            const t = document.createElement('div');
            t.className = 'pop-text';
            t.innerText = msgs[Math.floor(Math.random() * msgs.length)];
            t.style.left = x + 'px';
            t.style.top = y + 'px';
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 1500);
        }
    </script>
</body>
</html>
